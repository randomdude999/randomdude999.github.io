<!DOCTYPE html>
<html>
	<head>
		<title>Dice</title>
		<meta charset="utf-8">
		<meta name="keywords" content="dice, die, randomdude999, javascript">
		<link rel="shortcut icon" href="../img/favicon.ico">
		<script>
var random, html, previous, rotation = 0, toRotate, negative;
function main() {
	toRotate = Math.round(Math.random()*8-4)*90;
	random = Math.round(Math.random()*5);
	div = document.getElementsByTagName('div')[0];
	if(random === previous || toRotate === 0) {
		main();
		return;
	}
	rotation += toRotate;
	div.style.backgroundImage = "url(../img/Dice"+(random+1)+".png)";
	div.style.transform = "rotate("+rotation+"deg)";
	previous = random;
}
window.onload = main;
		</script>
	</head>
	<body>
		<div style="position: absolute; top: 50%; left: 50%; width: 256px;height: 256px;margin-top: -128px;margin-left: -128px; transition: background 0.5s linear 0.25s, transform 1s ease-out;"><div onclick="main()" style="width: 100%; height: 100%; border-radius: 64px; cursor: pointer;"></div></div>
	</body>
</html>
