<!DOCTYPE html>
<html>
<head>
<title>Chipers</title>
<meta charset=ascii>
<script>
function ROTn(text, map) {
  // Generic ROT-n algorithm for keycodes in MAP.
  var R = new String()
  var i, j, c, len = map.length
  for(i = 0; i < text.length; i++) {
    c = text.charAt(i)
    j = map.indexOf(c)
    if (j >= 0) {
      c = map.charAt((j + len / 2) % len)
    }
    R = R + c
  }
  return R;
}

function ROT47(text) {
  // Hides all ASCII-characters from 33 ("!") to 126 ("~").  Hence can be used
  // to obfuscate virtually any text, including URLs and emails.
  var R = new String()
  R = ROTn(text,
  "!\"#$%&'()*+,-./0123456789:;<=>?@ABCDEFGHIJKLMNOPQRSTUVWXYZ[\\]^_`abcdefghijklmnopqrstuvwxyz{|}~")
  return R;
}

function ROT13(text) {
  // Hides all letters in the English alphabet (a-z, A-Z)
  var R = new String()
  R = ROTn(text, "abcdefghijklmnopqrstuvwxyz")
  R = ROTn(R, "ABCDEFGHIJKLMNOPQRSTUVWXYZ")
  return R;
}
</script>
<link href='http://fonts.googleapis.com/css?family=Oswald|Ubuntu+Mono' rel='stylesheet' type='text/css'>
<style>
body {
  background-color: #000;
  margin: 30px;
}
input {
  font-family: Oswald;
}
textarea {
  font-family: Ubuntu Mono;
}
</style>
</head>
<body>
<textarea rows=10 cols=40 id=text></textarea>
<br>
<input type=button onclick="document.getElementById('text').value=ROT47(document.getElementById('text').value)" value=ROT47>
<input type=button onclick="document.getElementById('text').value=ROT13(document.getElementById('text').value)" value=ROT13>
</body>
</html>
